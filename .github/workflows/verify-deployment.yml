# Tras un deployment exitoso (p. ej. Vercel → GitHub), verifica rutas críticas del sitio.
# Misma lógica que `scripts/deploy-readiness.mjs` (sin secretos).

name: Verificar deploy

on:
  deployment_status:

permissions:
  contents: read
  deployments: read

jobs:
  smoke-deployment-url:
    name: Deploy readiness (post-deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: github.event.deployment_status.state == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rutas críticas en environment_url
        env:
          DEPLOY_READINESS_URL: ${{ github.event.deployment_status.environment_url }}
        run: |
          if [ -z "$DEPLOY_READINESS_URL" ]; then
            echo "::notice::Sin environment_url; omitido (algunos integradores no lo envían)."
            exit 0
          fi
          echo "Entorno: ${{ github.event.deployment_status.environment }}"
          node scripts/deploy-readiness.mjs
