name: Catalog Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger protected sync endpoint
        env:
          BASE_URL: ${{ secrets.REDALIA_SYNC_BASE_URL }}
          SYNC_SECRET: ${{ secrets.REDALIA_SYNC_SECRET }}
        run: |
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://www.redalia.cl"
          fi
          if [ -z "$SYNC_SECRET" ]; then
            echo "Missing REDALIA_SYNC_SECRET secret in GitHub Actions."
            exit 1
          fi
          URL="${BASE_URL%/}/api/internal/sync-catalog?secret=${SYNC_SECRET}"
          STATUS=$(curl -sS -o /tmp/sync-response.json -w "%{http_code}" "$URL")
          cat /tmp/sync-response.json
          if [ "$STATUS" -ge 400 ]; then
            echo "Sync failed with status $STATUS"
            exit 1
          fi
