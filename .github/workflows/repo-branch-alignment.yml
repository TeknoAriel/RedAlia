# Informe de cuánto va cada rama remota respecto de origin/main (sin modificar ramas).
# Útil para detectar PRs desactualizados. Ejecutar manual o semanal.

name: Informe alineación ramas

on:
  workflow_dispatch:
  schedule:
    - cron: "15 9 * * 2"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch y reporte
        env:
          REPO_ALIGN_EXCLUDE_PREFIXES: ${{ vars.REPO_ALIGN_EXCLUDE_PREFIXES }}
        run: |
          git fetch origin --prune
          node scripts/repo-branch-alignment.mjs >> "$GITHUB_STEP_SUMMARY"
